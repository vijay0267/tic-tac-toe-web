<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tic-Tac-Toe</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="container">
    <h1>Tic-Tac-Toe</h1>
    <div id="scoreboard" class="scoreboard">
      <div class="score-item">
        <span class="score-label x-color">You (X)</span>
        <span id="score-x" class="score-value">0</span>
      </div>
      <div class="score-item">
        <span class="score-label draw-color">Draw</span>
        <span id="score-draw" class="score-value">0</span>
      </div>
      <div class="score-item">
        <span class="score-label o-color">AI (O)</span>
        <span id="score-o" class="score-value">0</span>
      </div>
    </div>
    <div id="status" class="status">Your turn (X)</div>
    <div id="game-board" class="board"></div>
    <button id="restart-btn" class="btn">🔄 New Game</button>
  </div>
  <script src="script.js"></script>
</body>
</html>
